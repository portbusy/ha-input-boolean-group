name: Stale

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v10
        with:
          days-before-issue-stale: 60
          days-before-issue-close: 14
          days-before-pr-stale: 30
          days-before-pr-close: 14
          stale-issue-label: stale
          stale-pr-label: stale
          stale-issue-message: >
            This issue has been inactive for 60 days. It will be closed in 14 days
            unless there is further activity. If the problem still exists, please
            leave a comment so we know it is still relevant.
          close-issue-message: >
            Closing due to inactivity. Feel free to reopen if the issue is still
            present, or open a new one with updated information.
          stale-pr-message: >
            This pull request has been inactive for 30 days. It will be closed in
            14 days unless there is further activity.
          close-pr-message: >
            Closing due to inactivity. Feel free to reopen or open a new PR.
          exempt-issue-labels: "pinned,security,in-progress"
          exempt-pr-labels: "pinned,security,in-progress"
