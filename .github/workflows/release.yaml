name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 0.1.0)"
        required: true

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Resolve version and tag
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Update manifest version
        run: |
          jq --arg v "${{ steps.ver.outputs.version }}" '.version = $v' \
              custom_components/input_boolean_group/manifest.json > tmp.json \
            && mv tmp.json custom_components/input_boolean_group/manifest.json

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add custom_components/input_boolean_group/manifest.json
          git diff --cached --quiet || git commit -m "chore: bump version to ${{ steps.ver.outputs.version }}"
          git push origin HEAD:main || true

      - name: Create tag (workflow_dispatch only)
        if: github.event_name == 'workflow_dispatch'
        run: |
          git tag "${{ steps.ver.outputs.tag }}" || true
          git push origin "${{ steps.ver.outputs.tag }}" || true

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.ver.outputs.tag }}"
          if gh release view "$TAG" &>/dev/null; then
            gh release edit "$TAG" --generate-notes
          else
            gh release create "$TAG" --generate-notes
          fi
